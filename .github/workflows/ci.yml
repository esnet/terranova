name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y graphviz graphviz-dev

      - name: Install Python dependencies
        run: |
          echo "cython<3" > /tmp/constraint.txt
          PIP_CONSTRAINT=/tmp/constraint.txt pip install -r requirements.txt
          PIP_CONSTRAINT=/tmp/constraint.txt pip install -e .

      - name: Run API and backend tests
        run: |
          TERRANOVA_CONF=./SAMPLE_CONFIG.yml pytest -v --ignore=tests/frontend/
