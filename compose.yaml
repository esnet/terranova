services:
    terranova:
        image: ghcr.io/esnet/terranova:latest
        # To build locally instead: uncomment and remove the image line above
        # build: .
        ports:
            - 9999:80
        volumes:
            - terranova-data:/data
        environment:
            TERRANOVA_CORS_ORIGINS: "http://localhost:9999"

volumes:
    terranova-data:
