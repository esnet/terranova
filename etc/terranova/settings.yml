environment: production

# Storage backend configuration
# Default: sqlite (lightweight, no external dependencies)
# Alternative: elasticsearch (production-grade, scalable)
storage:
  backend: sqlite
  sqlite_path: /data/terranova.db

# Elasticsearch configuration (only required if storage.backend is set to "elasticsearch")
elastic:
  username: elastic
  password: DkIedPPSCb
  # url: http://elastic:9200
  url: http://localhost:9200
  indices:
    template:
      read: terranova-template
      write: terranova-template
    map:
      read: terranova-map
      write: terranova-map
    dataset:
      read: terranova-dataset
      write: terranova-dataset
    userdata:
      read: terranova-userdata
      write: terranova-userdata
    sheets_settings:
      read: terranova-sheets
      write: terranova-sheets

datasources:
  google_sheets:
    credential_type: dynamic
    cache_file: /data/google_sheets.sqlite
    # Auto-generated by the entrypoint script on first boot.
    # Override by setting TERRANOVA_ENCRYPTION_KEY environment variable.
    encryption_key: PLACEHOLDER
    dynamic:
      elastic_read_index: sheets_tokens
      elastic_write_index: sheets_tokens

auth:
  backend: basic
  read_scope: "terranova:maps:read"
  write_scope: "terranova:maps:write"
  publish_scope: "terranova:maps:publish"
  admin_scope: "terranova:admin"

basic_auth:
  db_filename: /data/basic_auth.sqlite